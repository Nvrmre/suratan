<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview CV &bull; Suratan</title>
    <style>
        :root {
            --primary: #1e3a5f;
            --primary-light: #2b6cb0;
            --accent: #e8b831;
            --bg: #e2e8f0;
            --text: #1a202c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }
        .toolbar {
            position: sticky; top: 0; z-index: 10;
            background: var(--primary); color: white;
            padding: 12px 24px;
            display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
        }
        .toolbar h2 { font-size: 16px; font-weight: 600; }
        .toolbar .actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .btn {
            padding: 10px 24px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block;
            touch-action: manipulation; transition: all 0.15s;
        }
        .btn-primary { background: var(--accent); color: var(--primary); }
        .btn-primary:hover { background: #d4a72c; }
        .btn-secondary { background: rgba(255,255,255,0.15); color: white; }
        .btn-secondary:hover { background: rgba(255,255,255,0.25); }
        .btn:active { transform: scale(0.98); }

        .toggle-wrap {
            display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.8);
        }
        .toggle {
            position: relative; width: 48px; height: 26px; background: rgba(255,255,255,0.3); border-radius: 13px;
            cursor: pointer; transition: background 0.2s; flex-shrink: 0;
        }
        .toggle.active { background: var(--accent); }
        .toggle::after {
            content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px;
            background: white; border-radius: 50%; transition: transform 0.2s;
        }
        .toggle.active::after { transform: translateX(22px); }

        .paper {
            width: 210mm; min-height: 297mm; margin: 24px auto;
            background: white; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 0;
        }
        .paper-inner { padding: 2cm; }
        .cv-content { display: none; }
        .cv-content.active { display: block; }

        @media (max-width: 800px) {
            .paper { width: auto; margin: 12px; min-height: auto; }
            .paper-inner { padding: 16px; }
            .toolbar { padding: 10px 16px; }
            .toolbar h2 { font-size: 14px; }
            .btn { padding: 8px 16px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <h2>Preview CV</h2>
        <div class="actions">
            <div class="toggle-wrap">
                <span id="lang-label">ID</span>
                <div class="toggle" id="lang-toggle" onclick="toggleLang()"></div>
                <span>EN</span>
            </div>
            <a href="/cv" class="btn btn-secondary">Kembali</a>
            <a href="/generate_cv_from_token/{{ token }}" class="btn btn-primary" id="dl-btn">Download PDF (ID)</a>
        </div>
    </div>
    <div class="paper">
        <div class="paper-inner">
            <div class="cv-content active" id="cv-id">{{ cv_html_id | safe }}</div>
            <div class="cv-content" id="cv-en">{{ cv_html_en | safe }}</div>
        </div>
    </div>

    <script>
        let currentLang = 'id';
        function toggleLang() {
            const toggle = document.getElementById('lang-toggle');
            const idContent = document.getElementById('cv-id');
            const enContent = document.getElementById('cv-en');
            const dlBtn = document.getElementById('dl-btn');
            const label = document.getElementById('lang-label');

            if (currentLang === 'id') {
                currentLang = 'en';
                toggle.classList.add('active');
                idContent.classList.remove('active');
                enContent.classList.add('active');
                dlBtn.href = '/generate_cv_from_token/{{ token }}?lang=en';
                dlBtn.textContent = 'Download PDF (EN)';
                label.textContent = '';
            } else {
                currentLang = 'id';
                toggle.classList.remove('active');
                enContent.classList.remove('active');
                idContent.classList.add('active');
                dlBtn.href = '/generate_cv_from_token/{{ token }}';
                dlBtn.textContent = 'Download PDF (ID)';
                label.textContent = 'ID';
            }
        }
    </script>
</body>
</html>
