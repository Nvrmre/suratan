<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Proposal &bull; Suratan</title>
    <style>
        :root {
            --primary: #1e3a5f;
            --accent: #e8b831;
            --bg: #e2e8f0;
            --text: #1a202c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }
        .toolbar {
            position: sticky; top: 0; z-index: 10;
            background: var(--primary); color: white;
            padding: 12px 24px;
            display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
        }
        .toolbar h2 { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .toolbar h2 span { color: var(--accent); }
        .toolbar .actions { display: flex; gap: 10px; }
        .btn {
            padding: 10px 24px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block;
            touch-action: manipulation; transition: all 0.15s;
        }
        .btn-primary { background: var(--accent); color: var(--primary); }
        .btn-primary:hover { background: #d4a72c; }
        .btn-secondary { background: rgba(255,255,255,0.15); color: white; }
        .btn-secondary:hover { background: rgba(255,255,255,0.25); }
        .btn:active { transform: scale(0.98); }

        .paper { width: 210mm; min-height: 297mm; margin: 24px auto; background: white; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 2.5cm; }

        @media (max-width: 800px) {
            .paper { width: auto; margin: 12px; min-height: auto; padding: 20px; }
            .toolbar { padding: 10px 16px; }
            .toolbar h2 { font-size: 14px; }
            .btn { padding: 8px 16px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <h2>Preview Proposal</h2>
        <div class="actions">
            <a href="/proposal" class="btn btn-secondary">Kembali</a>
            <a href="/generate_proposal_from_token/{{ token }}" class="btn btn-primary">Download PDF</a>
        </div>
    </div>
    <div class="paper">
        {{ proposal_html | safe }}
    </div>
</body>
</html>
