<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Surat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #e2e8f0;
        }
        .toolbar {
            position: sticky;
            top: 0;
            z-index: 10;
            background: white;
            border-bottom: 1px solid #cbd5e0;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        .toolbar h2 {
            font-size: 16px;
            color: #2d3748;
        }
        .toolbar .actions {
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            touch-action: manipulation;
        }
        .btn-primary {
            background: #4299e1;
            color: white;
        }
        .btn-primary:hover { background: #3182ce; }
        .btn-secondary {
            background: #edf2f7;
            color: #4a5568;
        }
        .btn-secondary:hover { background: #e2e8f0; }
        .paper {
            width: 210mm;
            min-height: 297mm;
            margin: 24px auto;
            background: white;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            padding: 0;
        }
        .paper-inner {
            padding: 2.5cm 2.5cm 2.5cm 3cm;
        }
        @media (max-width: 800px) {
            .paper { width: auto; margin: 12px; min-height: auto; }
            .paper-inner { padding: 20px; }
            .toolbar { padding: 10px 16px; }
            .toolbar h2 { font-size: 14px; }
            .btn { padding: 8px 16px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <h2>Preview Surat</h2>
        <div class="actions">
            <a href="/" class="btn btn-secondary">Kembali</a>
            <a href="/generate_from_token/{{ token }}" class="btn btn-primary">Download PDF</a>
        </div>
    </div>
    <div class="paper">
        <div class="paper-inner">
            {{ letter_html | safe }}
        </div>
    </div>
</body>
</html>
